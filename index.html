<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI Adventure</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0F1115">

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AI Adventure">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="app">

    <header class="header">
      <div class="header__brand">
        <span class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </span>
        <span class="brand-name">AI Adventure</span>
      </div>
      <div class="header__stats">
        <div class="stat-chip stat-chip--streak">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
          </svg>
          <span>0</span>
        </div>
        <div class="stat-chip stat-chip--gems">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 3h12l4 6-10 13L2 9z"/>
            <path d="M11 3 8 9l4 13 4-13-3-6"/>
            <path d="M2 9h20"/>
          </svg>
          <span>0</span>
        </div>
      </div>
    </header>

    <div id="home-screen" class="scroll-area">

      <div class="player-card">
        <div class="player-avatar">
          <span class="player-avatar__initials">AP</span>
          <span class="player-level-badge">1</span>
        </div>
        <div class="player-details">
          <p class="player-name">Apprentice</p>
          <p class="player-title">AI Learner · Level 1</p>
          <div class="player-stats-row">
            <div class="player-stat">
              <span class="player-stat__val">1</span>
              <span class="player-stat__key">Lessons</span>
            </div>
            <div class="player-stat">
              <span class="player-stat__val">0</span>
              <span class="player-stat__key">Streak</span>
            </div>
            <div class="player-stat">
              <span class="player-stat__val">45</span>
              <span class="player-stat__key">Total XP</span>
            </div>
          </div>
          <div class="xp-bar">
            <div class="xp-bar__track">
              <div class="xp-bar__fill" style="width: 45%"></div>
            </div>
            <span class="xp-bar__label">45 / 100 XP</span>
          </div>
        </div>
      </div>

      <main class="world-map"></main>
    </div>

    <div id="achievements-screen" class="achievements-screen hidden"></div>

    <nav class="bottom-nav">
      <button class="nav-btn nav-btn--active" data-nav="home" aria-label="Home">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-btn" data-nav="map" aria-label="Map">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
            <line x1="8" y1="2" x2="8" y2="18"/>
            <line x1="16" y1="6" x2="16" y2="22"/>
          </svg>
        </span>
        <span class="nav-label">Map</span>
      </button>
      <button class="nav-btn" data-nav="achievements" aria-label="Achievements">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="8" r="6"/>
            <path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/>
          </svg>
        </span>
        <span class="nav-label">Achievements</span>
      </button>
    </nav>

    <div id="lesson-screen" class="lesson-screen hidden"></div>
    <div id="quiz-screen" class="lesson-screen hidden"></div>
    <div id="boss-screen" class="lesson-screen hidden"></div>

  </div>

  <script src="js/state.js"></script>
  <script src="js/xp.js"></script>
  <script src="js/LessonEngine.js"></script>
  <script src="js/QuizEngine.js"></script>
  <script src="js/BossEngine.js"></script>
  <script src="js/achievements/AchievementStorage.js"></script>
  <script src="js/achievements/AchievementEvents.js"></script>
  <script src="js/achievements/AchievementConditions.js"></script>
  <script src="js/achievements/AchievementService.js"></script>
  <script src="js/screens/home.js"></script>
  <script src="js/screens/lesson.js"></script>
  <script src="js/screens/quiz.js"></script>
  <script src="js/screens/boss.js"></script>
  <script src="js/screens/profile.js"></script>
  <script src="js/screens/achievements.js"></script>
  <script src="js/Animations.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
